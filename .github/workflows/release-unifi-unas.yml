name: Release unifi-unas

# Builds the on-device agent binaries and publishes an installable ZIP as a
# GitHub Release on this monorepo. No separate repository is used; the plugin
# is installed manually from the release asset (HACS cannot install an
# integration nested in a monorepo subdirectory).
#
# Trigger: push a tag like `unifi-unas-v0.1.0`.

on:
  push:
    tags:
      - "unifi-unas-v*"

permissions:
  contents: write

env:
  INTEGRATION_SRC: plugins/unifi-unas/homeassistant/custom_components/unifi_unas

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --locked

      - name: Build agent binaries
        run: |
          set -euo pipefail
          for target in aarch64-unknown-linux-musl x86_64-unknown-linux-musl; do
            cross build --release --target "$target" -p polaris-unas-agent
          done

      - name: Assemble installable ZIP
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/custom_components"
          cp -r "$INTEGRATION_SRC" "$STAGE/custom_components/unifi_unas"
          BIN_DIR="$STAGE/custom_components/unifi_unas/bin"
          cp target/aarch64-unknown-linux-musl/release/polaris-unas-agent "$BIN_DIR/polaris-unas-agent-aarch64"
          cp target/x86_64-unknown-linux-musl/release/polaris-unas-agent "$BIN_DIR/polaris-unas-agent-x86_64"
          # Archive contains custom_components/unifi_unas/... so it extracts
          # cleanly into a Home Assistant /config directory.
          ( cd "$STAGE" && zip -r "$RUNNER_TEMP/unifi_unas.zip" custom_components )

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ${{ runner.temp }}/unifi_unas.zip
