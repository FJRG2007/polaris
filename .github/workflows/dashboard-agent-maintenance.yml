name: Dashboard Agent Maintenance

# Weekly health sweep of the dashboard workspace: dependency audit, typecheck,
# and an outdated-dependency report. When something needs attention it opens (or
# updates) a single tracking issue instead of failing the run.
#
# This is the extension point for autonomous maintenance: an agent can be wired
# in here to read the same signals (audit / typecheck / outdated), propose fixes,
# and open PRs. The checks below are the modest, deterministic baseline it builds
# on - keep them cheap and side-effect free.

on:
  schedule:
    # Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

defaults:
  run:
    working-directory: dashboard

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npm run db:generate

      - name: Run maintenance checks
        id: checks
        run: |
          set +e
          report="$RUNNER_TEMP/report.md"
          problems=0
          {
            echo "## Dashboard maintenance report"
            echo
            echo "_Generated by \`dashboard-agent-maintenance\` on $(date -u +%Y-%m-%dT%H:%M:%SZ)._"
            echo
          } > "$report"

          echo "### npm audit" >> "$report"
          echo '```' >> "$report"
          npm audit >> "$report" 2>&1 || problems=1
          echo '```' >> "$report"

          echo "### typecheck" >> "$report"
          echo '```' >> "$report"
          npm run typecheck >> "$report" 2>&1 || problems=1
          echo '```' >> "$report"

          echo "### npm outdated" >> "$report"
          echo '```' >> "$report"
          # `npm outdated` exits non-zero when anything is outdated; that is
          # informational here, not a failure signal.
          npm outdated >> "$report" 2>&1 || true
          echo '```' >> "$report"

          echo "problems=$problems" >> "$GITHUB_OUTPUT"
          echo "report=$report" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        if: steps.checks.outputs.problems == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: ${{ steps.checks.outputs.report }}
        run: |
          set -euo pipefail
          title="Dashboard maintenance: audit/typecheck attention needed"
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file "$REPORT"
          else
            gh issue create --title "$title" --body-file "$REPORT" --label maintenance || \
              gh issue create --title "$title" --body-file "$REPORT"
          fi
