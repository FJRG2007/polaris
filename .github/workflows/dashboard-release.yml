name: Dashboard Release

# On a `dashboard-v*` tag, cross-compiles the polaris-hostd static musl binaries
# (aarch64 + x86_64) and attaches them to the GitHub Release (mirrors
# release-unifi-unas.yml). The container image is not versioned - it is published
# as `latest` only by dashboard-publish.yml on every push to main.
#
# Trigger: push a tag like `dashboard-v0.1.0`.

on:
  push:
    tags:
      - "dashboard-v*"

permissions:
  contents: write

jobs:
  hostd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --locked

      - name: Build hostd binaries
        run: |
          set -euo pipefail
          for target in aarch64-unknown-linux-musl x86_64-unknown-linux-musl; do
            cross build --release --target "$target" -p polaris-hostd
          done

      - name: Stage binaries
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/hostd"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp target/aarch64-unknown-linux-musl/release/polaris-hostd "$STAGE/polaris-hostd-aarch64"
          cp target/x86_64-unknown-linux-musl/release/polaris-hostd "$STAGE/polaris-hostd-x86_64"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ${{ runner.temp }}/hostd/polaris-hostd-*
