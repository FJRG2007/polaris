name: Publish dashboard image

# Build and push the dashboard images to GHCR on every change to main, keeping
# only the `latest` tag (no versioned tags). Installs then pull instead of
# building from source. The packages must be made public once in GitHub
# (Settings -> Packages -> change visibility) so unauthenticated pulls work.
#
# Each image is its own job, gated on whether its sources actually changed, so a
# web-only push does not rebuild the multi-arch Rust host daemon (the slowest
# step by far). Jobs also run in parallel, so wall-clock is the slowest single
# image, not the sum of all four.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/apps/**"
      - "dashboard/packages/**"
      - "dashboard/cli/**"
      - "dashboard/docker/**"
      - "dashboard/mdns/**"
      - "dashboard/services/messaging-bridge/**"
      - "dashboard/package.json"
      - "dashboard/package-lock.json"
      - "crates/polaris-hostd/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/dashboard-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Decide which images need rebuilding from the paths that changed in this push.
  # A workflow_dispatch, an unknown base, or a change to this file rebuilds all.
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mdns: ${{ steps.filter.outputs.mdns }}
      hostd: ${{ steps.filter.outputs.hostd }}
      updater: ${{ steps.filter.outputs.updater }}
      bridge: ${{ steps.filter.outputs.bridge }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          out() { echo "$1=$2" >> "$GITHUB_OUTPUT"; }
          all() { out web true; out mdns true; out hostd true; out updater true; out bridge true; }
          if [ "$EVENT" = "workflow_dispatch" ] || [ -z "${BEFORE:-}" ] \
             || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            all; exit 0
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "$SHA")
          echo "Changed files:"; echo "$CHANGED"
          has() { echo "$CHANGED" | grep -qE "$1"; }
          if has '^\.github/workflows/dashboard-publish\.yml$'; then all; exit 0; fi
          has '^dashboard/(apps|packages|cli)/|^dashboard/docker/(Dockerfile|entrypoint\.sh)|^dashboard/package(-lock)?\.json$' && out web true || out web false
          has '^dashboard/mdns/' && out mdns true || out mdns false
          has '^crates/polaris-hostd/|^Cargo\.(toml|lock)$' && out hostd true || out hostd false
          has '^dashboard/docker/updater/' && out updater true || out updater false
          has '^dashboard/services/messaging-bridge/|^dashboard/packages/messaging/|^dashboard/package(-lock)?\.json$' && out bridge true || out bridge false

  # Next.js dashboard. amd64 only (the runtime servers are x86). Layer caching in
  # the Dockerfile keeps `npm ci` cached across source-only changes.
  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: dashboard
          file: dashboard/docker/Dockerfile
          push: true
          tags: ghcr.io/fjrg2007/polaris-dashboard:latest
          build-args: |
            POLARIS_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  mdns:
    needs: changes
    if: ${{ needs.changes.outputs.mdns == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: dashboard/mdns
          push: true
          tags: ghcr.io/fjrg2007/polaris-mdns:latest
          cache-from: type=gha,scope=mdns
          cache-to: type=gha,mode=max,scope=mdns

  # Privileged host daemon (Rust workspace at the repo root). Built per-arch on
  # NATIVE runners - amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm - instead of
  # emulating arm64 under QEMU (which made this the ~7-minute bottleneck). Each arch
  # pushes by digest; the manifest job below stitches them into the :latest tag.
  hostd:
    needs: changes
    if: ${{ needs.changes.outputs.hostd == 'true' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/polaris-hostd/Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=hostd-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=hostd-${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/fjrg2007/polaris-hostd,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: hostd-digest-${{ strategy.job-index }}
          path: ${{ runner.temp }}/digests/*
          retention-days: 1
          if-no-files-found: error

  # Stitch the per-arch digests into the multi-arch :latest manifest.
  hostd-manifest:
    needs: [changes, hostd]
    if: ${{ needs.changes.outputs.hostd == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: hostd-digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create -t ghcr.io/fjrg2007/polaris-hostd:latest \
            $(printf 'ghcr.io/fjrg2007/polaris-hostd@sha256:%s ' *)

  # One-shot self-update runner spawned by hostd's /v1/update.
  updater:
    needs: changes
    if: ${{ needs.changes.outputs.updater == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: dashboard/docker/updater
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/fjrg2007/polaris-updater:latest
          cache-from: type=gha,scope=updater
          cache-to: type=gha,mode=max,scope=updater

  # Messaging bridge sidecar. The marketplace installs this image as a managed
  # Deploy app (it is not part of the web image), so it must be published for
  # installs to pull. amd64 only, matching the runtime servers. Its build context
  # is the dashboard root so the workspace and @polaris/messaging are available.
  bridge:
    needs: changes
    if: ${{ needs.changes.outputs.bridge == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: dashboard
          file: dashboard/services/messaging-bridge/Dockerfile
          push: true
          tags: ghcr.io/fjrg2007/polaris-messaging-bridge:latest
          cache-from: type=gha,scope=bridge
          cache-to: type=gha,mode=max,scope=bridge
