name: Publish dashboard image

# Build and push the dashboard images to GHCR on every change to main, keeping
# only the `latest` tag (no versioned tags). Installs then pull instead of
# building from source. The packages must be made public once in GitHub
# (Settings -> Packages -> change visibility) so unauthenticated pulls work.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/apps/**"
      - "dashboard/packages/**"
      - "dashboard/docker/**"
      - "dashboard/mdns/**"
      - "dashboard/package.json"
      - "dashboard/package-lock.json"
      - "crates/polaris-hostd/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/dashboard-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web (latest only)
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          file: dashboard/docker/Dockerfile
          push: true
          tags: ghcr.io/fjrg2007/polaris-dashboard:latest
          build-args: |
            POLARIS_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push mdns (latest only)
        uses: docker/build-push-action@v6
        with:
          context: dashboard/mdns
          push: true
          tags: ghcr.io/fjrg2007/polaris-mdns:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # QEMU lets buildx produce the arm64 variants below on the amd64 runner.
      - uses: docker/setup-qemu-action@v3

      # Privileged host daemon. Build context is the repo root (the Rust
      # workspace). Multi-arch so both amd64 and arm64 hosts can pull; a host can
      # also fall back to the local `build:` context in compose, which builds
      # natively.
      - name: Build and push hostd (latest only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/polaris-hostd/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/fjrg2007/polaris-hostd:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # One-shot self-update runner spawned by hostd's /v1/update.
      - name: Build and push updater (latest only)
        uses: docker/build-push-action@v6
        with:
          context: dashboard/docker/updater
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/fjrg2007/polaris-updater:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
