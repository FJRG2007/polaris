# Polaris dashboard stack.
#
# Two editions share this one file, selected by the `full` compose profile:
#   - Full (installer default): additionally starts the privileged `hostd`
#     daemon, which unlocks kernel mounts (SMB/NFS), host filesystem access, the
#     allowlisted Docker proxy, and daemon-driven updates. The installer sets
#     COMPOSE_PROFILES=full in .env so every `docker compose` picks it up.
#   - Limited (`install.sh --limited`, or a bare `docker compose up` with no
#     profile): postgres + web + caddy only. Cloud/API and userspace storage
#     providers work; host access is disabled.
#
# The privileged daemon stays behind the profile so a bare `up` without the
# profile never grants host access by accident. Even with it enabled, the
# dashboard only reports the `full` edition once the daemon answers over the
# shared socket with a valid token.
name: polaris

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polaris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-polaris}
    volumes:
      - polaris-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polaris} -d ${POSTGRES_DB:-polaris}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    # Prebuilt image (release workflow) with a local-build fallback for dev.
    image: ghcr.io/fjrg2007/polaris-dashboard:${POLARIS_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Always re-pull the tag so `up`/`start` never runs a stale cached image; the
    # tag tracks releases, so freshness matters more than an offline start.
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Trust the local-network names for auth; kept in sync with the mdns service.
      POLARIS_LOCAL_HOSTNAME: ${POLARIS_MDNS_HOSTNAME:-polaris}
    depends_on:
      postgres:
        condition: service_healthy
    # Resolve the host from inside the container so the Docker-over-SSH connector
    # can reach the host Engine at host.docker.internal on Linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Socket + token shared with the daemon (populated only in the full edition).
      - polaris-run:/run/polaris
      # Container-local storage and upload scratch (POLARIS_DATA_DIR).
      - polaris-data:/var/lib/polaris
      # Dedicated SSH key + pinned known_hosts for the Docker connector, mounted
      # read-only. Populated by `install.sh --ssh`; empty (and ignored) otherwise.
      # Absolute host path so the mount is correct even when compose runs inside the
      # self-update container (POLARIS_HOST_REPO is the true host repo root); the
      # `../..` default resolves to the repo root for a direct host run.
      - ${POLARIS_HOST_REPO:-../..}/dashboard/docker/secrets/ssh:/run/polaris-ssh:ro
    # Not published to the host: Caddy is the only public entry point.
    expose:
      - "3000"
    # Readiness: 200 from /api/health means the app is serving AND its database
    # answers. start_period covers first-boot migrations so they do not count as
    # failures. `polaris status` and the installer's post-deploy check read this.
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    environment:
      # Public site address (domain, or :443 / :80 for IP-only setups).
      POLARIS_SITE_ADDRESS: ${POLARIS_SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      # Absolute host path (see the hostd ssh mount note) so caddy's Caddyfile mount
      # survives a self-update, where compose runs from the container path /polaris.
      - ${POLARIS_HOST_REPO:-../..}/dashboard/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - polaris-caddy-data:/data
      - polaris-caddy-config:/config

  # --- Local network discovery (polaris.local) ------------------------------
  # Advertises polaris.local over mDNS, the way Home Assistant publishes
  # homeassistant.local. Needs the host network because multicast does not cross
  # a bridged docker network (works on Linux/WSL; Docker Desktop restricts host
  # networking, where the installer's hosts entry covers the local machine).
  mdns:
    image: ghcr.io/fjrg2007/polaris-mdns:${POLARIS_IMAGE_TAG:-latest}
    build:
      context: ../mdns
    pull_policy: always
    network_mode: host
    restart: unless-stopped
    environment:
      POLARIS_MDNS_HOSTNAME: ${POLARIS_MDNS_HOSTNAME:-polaris}
      POLARIS_MDNS_PORT: ${POLARIS_MDNS_PORT:-80}

  # --- Full edition ---------------------------------------------------------
  # Privileged host daemon. Runs the static musl `polaris-hostd` binary and
  # brokers host access for the web container over the shared unix socket:
  # native mounts, host filesystem, the allowlisted Docker proxy, and in-band
  # updates. Kept in the `full` profile; the installer enables that profile by
  # default (opt out with `install.sh --limited`), so a bare `docker compose up`
  # without the profile still starts only the sandboxed services.
  hostd:
    profiles: ["full"]
    image: ghcr.io/fjrg2007/polaris-hostd:${POLARIS_IMAGE_TAG:-latest}
    # Build from the Rust workspace when the published image is unavailable
    # (offline, or before the registry has it). Context is the repo root.
    build:
      context: ../..
      dockerfile: crates/polaris-hostd/Dockerfile
    pull_policy: always
    restart: unless-stopped
    # Required for kernel mounts (SMB/NFS) and host filesystem access.
    privileged: true
    environment:
      POLARIS_HOSTD_SOCKET: /run/polaris/hostd.sock
      POLARIS_HOSTD_TOKEN_FILE: /run/polaris/hostd.token
      # Auto-update: mirrors the app's master switch. The command is written by
      # the installer with the host repo path baked in; unset -> /v1/update 501.
      POLARIS_HOSTD_AUTOUPDATE: ${POLARIS_AUTO_UPDATE:-true}
      POLARIS_HOSTD_UPDATE_CMD: ${POLARIS_HOSTD_UPDATE_CMD:-}
    volumes:
      # Same socket/token volume the web container reads.
      - polaris-run:/run/polaris
      # Docker control for the container-management app.
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount root, shared so mounts the daemon creates propagate to the host.
      - type: bind
        source: /mnt/polaris
        target: /mnt/polaris
        bind:
          propagation: rshared

  # --- Deploy app proxy (opt-in) --------------------------------------------
  # Traefik edge for containers deployed through the Deploy app. It discovers
  # deployed services by their labels on the shared `polaris-proxy` network and
  # issues Let's Encrypt certs (HTTP-01). Kept in the `proxy` profile because it
  # binds 80/443 - enable it INSTEAD of Caddy when you route deployed apps and
  # the dashboard through one edge (set POLARIS_ACME_EMAIL). The same Traefik is
  # installed on remote servers by the Deploy onboarding script.
  traefik:
    profiles: ["proxy"]
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=polaris-proxy"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${POLARIS_ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/traefik/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - polaris-traefik:/traefik
    networks:
      - default
      - polaris-proxy

networks:
  # Shared network deployed services and the proxy join for name-based routing.
  polaris-proxy:
    name: polaris-proxy

volumes:
  polaris-postgres:
  polaris-run:
  polaris-data:
  polaris-caddy-data:
  polaris-caddy-config:
  polaris-traefik:
